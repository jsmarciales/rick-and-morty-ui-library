<div [class]="cardClasses()">

  <div
    class="px-6 py-4 border-b border-green-500/20 cursor-pointer flex justify-between items-start"
    (click)="onHeaderClick()">
    <div>
      <h3 class="text-green-400 font-medium text-lg">{{ title() }}</h3>
      @if (subtitle()) {
        <p class="text-slate-400 text-sm mt-1">{{ subtitle() }}</p>
      }
    </div>
    <span class="text-green-500/60 text-xl ml-4">✕</span>
  </div>

  <div class="px-6 py-5">
    <ng-content />
  </div>

</div>
