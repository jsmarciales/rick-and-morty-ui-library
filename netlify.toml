[build]
  command = "npm ci && npx ng build ui-lib --configuration production && npx ng build demo-app --configuration production"
  publish = "dist/demo-app/browser"

[build.environment]
  NODE_VERSION = "22"
  ANGULAR_PROJECT = "demo-app"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200